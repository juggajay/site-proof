name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: filter
        name: Detect changed areas
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            backend=true
            frontend=true
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            git fetch --no-tags --prune --depth=1 origin "$base_sha" "$head_sha"
            git diff --name-only "$base_sha" "$head_sha" > /tmp/changed-files

            echo "Changed files:"
            cat /tmp/changed-files

            if grep -Eq '^(backend/|\.github/workflows/ci\.yml|package\.json|package-lock\.json)$' /tmp/changed-files; then
              backend=true
            else
              backend=false
            fi

            if grep -Eq '^(frontend/|\.github/workflows/ci\.yml|package\.json|package-lock\.json)$' /tmp/changed-files; then
              frontend=true
            else
              frontend=false
            fi
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: siteproof_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check formatting
        run: npm run format:check

      - name: Create shadow database
        run: PGPASSWORD=test psql -h localhost -U test -d postgres -c "CREATE DATABASE siteproof_shadow;"

      - name: Validate Prisma migrations
        run: npm run db:diff
        env:
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_shadow

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test

      - name: Verify database migration status
        run: npm run migrate:status
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t siteproof-backend-ci .
        env:
          DOCKER_BUILDKIT: "1"

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Upload backend coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 7

      - name: Check for unsafe patterns
        run: |
          echo "Checking for unsafe code patterns..."

          if grep -r -E "(executeRawUnsafe|queryRawUnsafe)" --include="*.ts" --include="*.js" --include="*.mjs" --include="*.cjs" src/ scripts/ 2>/dev/null; then
            echo "::error::Found unsafe raw Prisma usage - potential SQL injection risk"
            exit 1
          fi

          if grep -r "new PrismaClient" --include="*.ts" --include="*.js" src/routes/ 2>/dev/null; then
            echo "::error::Found new PrismaClient in routes - should use singleton from lib/prisma"
            exit 1
          fi

          echo "No unsafe patterns detected"

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 7

      - name: Production readiness guardrails
        run: npm run test:readiness

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name != 'pull_request'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: siteproof_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Prepare backend database
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run migrate:status
          npm run seed:e2e
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_e2e
          JWT_SECRET: e2e-secret-for-ci
          NODE_ENV: test

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Start backend
        run: nohup npm start > ../backend-e2e.log 2>&1 &
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_e2e
          JWT_SECRET: e2e-secret-for-ci
          NODE_ENV: test
          EMAIL_PROVIDER: mock

      - name: Wait for backend
        run: curl --retry 30 --retry-delay 2 --retry-connrefused http://localhost:3001/ready

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          CI: true
          VITE_API_URL: http://localhost:3001

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7
