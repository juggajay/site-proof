name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: siteproof_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check formatting
        run: npm run format:check

      - name: Create shadow database
        run: PGPASSWORD=test psql -h localhost -U test -d postgres -c "CREATE DATABASE siteproof_shadow;"

      - name: Validate Prisma migrations
        run: npm run db:diff
        env:
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_shadow

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test

      - name: Verify database migration status
        run: npm run migrate:status
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t siteproof-backend-ci .
        env:
          DOCKER_BUILDKIT: "1"

      - name: Production integration preflight
        run: npm run preflight:integrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test
          JWT_SECRET: production-preflight-secret-for-ci
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          FRONTEND_URL: https://app.siteproof.example
          BACKEND_URL: https://api.siteproof.example
          API_URL: https://api.siteproof.example
          EMAIL_ENABLED: "false"
          EMAIL_PROVIDER: resend
          ALLOW_LOCAL_FILE_STORAGE: "true"
          ALLOW_MOCK_OAUTH: "false"
          ALLOW_TEST_AUTH_ENDPOINTS: "false"
          RATE_LIMIT_STORE: database

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

      - name: Check for unsafe patterns
        run: |
          echo "Checking for unsafe code patterns..."

          if grep -r -E "(executeRawUnsafe|queryRawUnsafe)" --include="*.ts" --include="*.js" --include="*.mjs" --include="*.cjs" src/ scripts/ 2>/dev/null; then
            echo "::error::Found unsafe raw Prisma usage - potential SQL injection risk"
            exit 1
          fi

          if grep -r "new PrismaClient" --include="*.ts" --include="*.js" src/routes/ 2>/dev/null; then
            echo "::error::Found new PrismaClient in routes - should use singleton from lib/prisma"
            exit 1
          fi

          echo "No unsafe patterns detected"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Production readiness guardrails
        run: npm run test:readiness

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api
