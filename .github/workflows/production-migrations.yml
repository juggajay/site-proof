name: Production Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-production-migrations to apply pending production migrations
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-dispatch:
    name: Validate migration dispatch
    runs-on: ubuntu-latest
    steps:
      - name: Require master and typed confirmation
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.ref }}" != "refs/heads/master" ]]; then
            echo "::error::Production migrations can only run from refs/heads/master."
            exit 1
          fi

          if [[ "${{ github.event.inputs.confirm }}" != "deploy-production-migrations" ]]; then
            echo "::error::Refusing to run production migrations without the exact confirmation phrase."
            exit 1
          fi

  migrate:
    name: Deploy production migrations
    needs: validate-dispatch
    runs-on: ubuntu-latest
    environment:
      name: production
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Check production database secret
        shell: bash
        env:
          DATABASE_URL_PRESENT: ${{ secrets.DATABASE_URL != '' }}
        run: |
          set -euo pipefail
          if [[ "$DATABASE_URL_PRESENT" != "true" ]]; then
            echo "::error::Set DATABASE_URL in the GitHub production environment before deploying migrations."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check unique-index migration preconditions
        run: npm run db:migration-preconditions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy migrations
        run: npm run migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify migration status
        run: npm run migrate:status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
