name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: siteproof_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Audit dependencies
        run: cd backend && npm audit --audit-level=moderate

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Check formatting
        run: cd backend && npm run format:check

      - name: Create shadow database
        run: PGPASSWORD=test psql -h localhost -U test -d postgres -c "CREATE DATABASE siteproof_shadow;"

      - name: Validate Prisma migrations
        run: cd backend && npm run db:diff
        env:
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_shadow

      - name: Setup test database
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test

      - name: Verify test database migration status
        run: cd backend && npm run migrate:status
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test

      - name: Lint
        run: cd backend && npm run lint

      - name: Type check
        run: cd backend && npm run type-check

      - name: Build
        run: cd backend && npm run build

      - name: Build backend Docker image
        run: cd backend && docker build -t siteproof-backend-ci .
        env:
          DOCKER_BUILDKIT: "1"

      - name: Production integration preflight
        run: cd backend && npm run preflight:integrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test
          JWT_SECRET: production-preflight-secret-for-ci
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          FRONTEND_URL: https://app.siteproof.example
          BACKEND_URL: https://api.siteproof.example
          API_URL: https://api.siteproof.example
          EMAIL_ENABLED: "false"
          EMAIL_PROVIDER: resend
          ALLOW_LOCAL_FILE_STORAGE: "true"
          ALLOW_MOCK_OAUTH: "false"
          ALLOW_TEST_AUTH_ENDPOINTS: "false"
          RATE_LIMIT_STORE: database

      - name: Run tests with coverage
        run: cd backend && npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_test
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 30

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Audit dependencies
        run: cd frontend && npm audit --audit-level=moderate

      - name: Check formatting
        run: cd frontend && npm run format:check

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Lint
        run: cd frontend && npm run lint

      - name: Production readiness guardrails
        run: cd frontend && npm run test:readiness

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: /api

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: siteproof_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Prepare backend database
        run: |
          cd backend
          npx prisma generate
          npx prisma migrate deploy
          npm run migrate:status
          npm run seed:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_e2e
          JWT_SECRET: e2e-secret-for-ci
          NODE_ENV: test

      - name: Build backend
        run: cd backend && npm run build

      - name: Start backend
        run: |
          cd backend
          nohup npm start > ../backend-e2e.log 2>&1 &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/siteproof_e2e
          JWT_SECRET: e2e-secret-for-ci
          NODE_ENV: test
          EMAIL_PROVIDER: mock

      - name: Wait for backend
        run: curl --retry 30 --retry-delay 2 --retry-connrefused http://localhost:3001/ready

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Audit dependencies
        run: cd frontend && npm audit --audit-level=moderate

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd frontend && npm run test:e2e
        env:
          CI: true
          VITE_API_URL: http://localhost:3001

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7
