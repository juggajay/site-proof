name: Database Backup

on:
  schedule:
    # 00:37 Australia/Sydney during standard time.
    - cron: "37 14 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: PostgreSQL backup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_BACKUP_URL || secrets.DATABASE_URL }}
      DATABASE_BACKUP_ENCRYPTION_KEY: ${{ secrets.DATABASE_BACKUP_ENCRYPTION_KEY }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # The `runner` context is only available at step level, not in job env,
      # so BACKUP_DIR is derived from $RUNNER_TEMP here.
      - name: Configure backup directory
        run: echo "BACKUP_DIR=$RUNNER_TEMP/siteproof-db-backups" >> "$GITHUB_ENV"

      - name: Validate backup secret
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "::error::Set DATABASE_BACKUP_URL or DATABASE_URL as a repository secret for scheduled backups."
            exit 1
          fi
          if [[ -z "${DATABASE_BACKUP_ENCRYPTION_KEY:-}" ]]; then
            echo "::error::Set DATABASE_BACKUP_ENCRYPTION_KEY as a repository secret for encrypted backup artifacts."
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$DATABASE_BACKUP_ENCRYPTION_KEY"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        run: npm ci

      - name: Create and verify backup
        run: npm run db:backup

      - name: Encrypt backup artifact
        shell: bash
        run: |
          set -euo pipefail

          dump_path="$(find "$BACKUP_DIR" -maxdepth 1 -name '*.dump' -print -quit)"
          if [[ -z "$dump_path" ]]; then
            echo "::error::No backup dump was created."
            exit 1
          fi

          dump_name="$(basename "$dump_path")"
          archive_path="$BACKUP_DIR/${dump_name%.dump}.tar"
          tar -C "$BACKUP_DIR" -cf "$archive_path" "$dump_name" "$dump_name.sha256"

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$DATABASE_BACKUP_ENCRYPTION_KEY" \
            --symmetric --cipher-algo AES256 \
            --output "$archive_path.gpg" "$archive_path"

          sha256sum "$archive_path.gpg" > "$archive_path.gpg.sha256"
          rm -f "$BACKUP_DIR"/*.dump "$BACKUP_DIR"/*.dump.sha256 "$archive_path"

      - name: Upload verified backup artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: siteproof-db-backup-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/siteproof-db-backups/*.tar.gpg
            ${{ runner.temp }}/siteproof-db-backups/*.tar.gpg.sha256
          if-no-files-found: error
          retention-days: 30
