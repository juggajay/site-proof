name: Production Preflight

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment containing staging or production secrets
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  validate-dispatch:
    name: Validate preflight dispatch
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.validate.outputs.environment }}
    steps:
      - id: validate
        name: Require protected branch for production
        shell: bash
        run: |
          set -euo pipefail

          requested_environment="${{ github.event.inputs.environment }}"
          case "$requested_environment" in
            staging|production)
              ;;
            *)
              echo "::error::Unsupported preflight environment '$requested_environment'."
              exit 1
              ;;
          esac

          if [[ "$requested_environment" == "production" && "${{ github.ref }}" != "refs/heads/master" ]]; then
            echo "::error::Production preflight can only run from refs/heads/master."
            exit 1
          fi

          echo "environment=$requested_environment" >> "$GITHUB_OUTPUT"

  preflight:
    name: Production integration preflight
    needs: validate-dispatch
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-dispatch.outputs.environment }}
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build

      - id: preflight-config
        name: Check production preflight configuration
        shell: bash
        env:
          DATABASE_URL_PRESENT: ${{ secrets.DATABASE_URL != '' }}
          JWT_SECRET_PRESENT: ${{ secrets.JWT_SECRET != '' }}
          ENCRYPTION_KEY_PRESENT: ${{ secrets.ENCRYPTION_KEY != '' }}
          FRONTEND_URL_PRESENT: ${{ secrets.FRONTEND_URL != '' }}
          BACKEND_URL_PRESENT: ${{ secrets.BACKEND_URL != '' }}
          API_URL_PRESENT: ${{ secrets.API_URL != '' }}
          RESEND_API_KEY_PRESENT: ${{ secrets.RESEND_API_KEY != '' }}
          EMAIL_FROM_PRESENT: ${{ secrets.EMAIL_FROM != '' }}
          SUPABASE_URL_PRESENT: ${{ secrets.SUPABASE_URL != '' }}
          SUPABASE_SERVICE_ROLE_KEY_PRESENT: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
          SENTRY_DSN_PRESENT: ${{ secrets.SENTRY_DSN != '' }}
          VITE_SENTRY_DSN_PRESENT: ${{ secrets.VITE_SENTRY_DSN != '' }}
          GOOGLE_CLIENT_ID_PRESENT: ${{ secrets.GOOGLE_CLIENT_ID != '' }}
          GOOGLE_CLIENT_SECRET_PRESENT: ${{ secrets.GOOGLE_CLIENT_SECRET != '' }}
          GOOGLE_REDIRECT_URI_PRESENT: ${{ secrets.GOOGLE_REDIRECT_URI != '' }}
        run: |
          set -euo pipefail

          missing=()
          [[ "$DATABASE_URL_PRESENT" == "true" ]] || missing+=("DATABASE_URL")
          [[ "$JWT_SECRET_PRESENT" == "true" ]] || missing+=("JWT_SECRET")
          [[ "$ENCRYPTION_KEY_PRESENT" == "true" ]] || missing+=("ENCRYPTION_KEY")
          [[ "$FRONTEND_URL_PRESENT" == "true" ]] || missing+=("FRONTEND_URL")
          if [[ "$BACKEND_URL_PRESENT" != "true" && "$API_URL_PRESENT" != "true" ]]; then
            missing+=("BACKEND_URL or API_URL")
          fi
          [[ "$RESEND_API_KEY_PRESENT" == "true" ]] || missing+=("RESEND_API_KEY")
          [[ "$EMAIL_FROM_PRESENT" == "true" ]] || missing+=("EMAIL_FROM")
          [[ "$SUPABASE_URL_PRESENT" == "true" ]] || missing+=("SUPABASE_URL")
          [[ "$SUPABASE_SERVICE_ROLE_KEY_PRESENT" == "true" ]] || missing+=("SUPABASE_SERVICE_ROLE_KEY")
          [[ "$SENTRY_DSN_PRESENT" == "true" ]] || missing+=("SENTRY_DSN")
          [[ "$VITE_SENTRY_DSN_PRESENT" == "true" ]] || missing+=("VITE_SENTRY_DSN")
          if [[ "$GOOGLE_CLIENT_ID_PRESENT" == "true" || "$GOOGLE_CLIENT_SECRET_PRESENT" == "true" || "$GOOGLE_REDIRECT_URI_PRESENT" == "true" ]]; then
            [[ "$GOOGLE_CLIENT_ID_PRESENT" == "true" ]] || missing+=("GOOGLE_CLIENT_ID")
            [[ "$GOOGLE_CLIENT_SECRET_PRESENT" == "true" ]] || missing+=("GOOGLE_CLIENT_SECRET")
          fi

          if (( ${#missing[@]} > 0 )); then
            message="Production preflight is not configured; missing GitHub secrets: ${missing[*]}"
            echo "::error::$message"
            exit 1
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Check unique-index migration preconditions
        if: steps.preflight-config.outputs.configured == 'true'
        run: npm run db:migration-preconditions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify database migration status
        if: steps.preflight-config.outputs.configured == 'true'
        run: npm run migrate:status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run production integration preflight
        if: steps.preflight-config.outputs.configured == 'true'
        run: npm run preflight:integrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_URL: ${{ secrets.API_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'true' }}
          EMAIL_PROVIDER: resend
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ needs.validate-dispatch.outputs.environment }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          ALLOW_LOCAL_FILE_STORAGE: "false"
          REQUIRE_DURABLE_STORAGE: "true"
          ALLOW_MOCK_OAUTH: "false"
          ALLOW_TEST_AUTH_ENDPOINTS: "false"
          RATE_LIMIT_STORE: database
