name: Production Preflight

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment containing staging or production secrets
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  validate-dispatch:
    name: Validate preflight dispatch
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.validate.outputs.environment }}
    steps:
      - id: validate
        name: Require protected branch for production
        shell: bash
        run: |
          set -euo pipefail

          requested_environment="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}"
          case "$requested_environment" in
            staging|production)
              ;;
            *)
              echo "::error::Unsupported preflight environment '$requested_environment'."
              exit 1
              ;;
          esac

          if [[ "$requested_environment" == "production" ]]; then
            case "${{ github.ref }}" in
              refs/heads/main|refs/heads/master)
                ;;
              *)
                echo "::error::Production preflight can only run from refs/heads/main or refs/heads/master."
                exit 1
                ;;
            esac
          fi

          echo "environment=$requested_environment" >> "$GITHUB_OUTPUT"

  preflight:
    name: Production integration preflight
    needs: validate-dispatch
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-dispatch.outputs.environment }}
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build

      - name: Verify database migration status
        run: npm run migrate:status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run production integration preflight
        run: npm run preflight:integrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_URL: ${{ secrets.API_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'true' }}
          EMAIL_PROVIDER: resend
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          ALLOW_LOCAL_FILE_STORAGE: "false"
          REQUIRE_DURABLE_STORAGE: "true"
          ALLOW_MOCK_OAUTH: "false"
          ALLOW_TEST_AUTH_ENDPOINTS: "false"
          RATE_LIMIT_STORE: database
